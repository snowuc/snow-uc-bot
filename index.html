<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #1c1c1c; color: white; }
        button { background: #5288c1; border: none; padding: 15px 30px; color: white; border-radius: 10px; margin: 10px; width: 80%; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Выберите пак UC</h1>
    <button onclick="sendData('60 UC')">60 UC</button>
    <button onclick="sendData('325 UC')">325 UC</button>
    <button onclick="sendData('660 UC')">660 UC</button>

    <script>
        let tg = window.Telegram.WebApp;
        function sendData(item) {
            tg.sendData(item); // Отправляет выбор в Python-бот
            tg.close();
        }
    </script>
</body>
</html>
